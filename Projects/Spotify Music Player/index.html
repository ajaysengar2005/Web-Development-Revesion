<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Music - Player</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>
    <nav>
        <ul>
            <li class="brand"><img src="logo.png" alt="Spotify"><span>Spotify</span></li>
            <li>Home</li>
            <li>About</li>
        </ul>
    </nav>

    <div class="container"><h1>Best Hindi Songs</h1>
        <div class="songList"></div>
        <div class="songBanner"></div>
    </div>

    <div class="bottom"> 
        <input type="range" name="range" id="progressBar" min="0" max="100">
        <div class="icon">
            <i class="fas fa-2x fa-backward"></i>
            <i class="fas fa-2x fa-circle-play"></i>
            <i class=" fas fa-2x fa-forward"></i>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
