<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bulb - On/Off</title>
</head>
<body>
    <h1>How JavaScript switch on/off bulb ?</h1>
    <p>Let's control this by changing attribute value. </p>

    <button onclick="document.getElementById('img1').src='bulbOn.jpg'">Switch On Bulb</button>

    <img id="img1" src="bulbOff.jpg" alt="loading..." style="width: 200px;">
    
    <button onclick="document.getElementById('img1').src='bulbOff.jpg'">Switch Off Bulb</button>
    
</body>
</html>
